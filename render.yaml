services:
  - type: web
    name: chat-app-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        scope: secret
      - key: JWT_SECRET
        scope: secret
      - key: CLIENT_URL
        scope: secret
      - key: CLOUDINARY_CLOUD_NAME
        scope: secret
      - key: CLOUDINARY_API_KEY
        scope: secret
      - key: CLOUDINARY_API_SECRET
        scope: secret
